name: Generate QGIS Python Plugins Repository

on:
  push:
    paths:
      - 'plugins/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout
        uses: actions/checkout@v4 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate plugins.xml (Native Python)
        run: |
          python -c "
          import os, zipfile
          import xml.etree.ElementTree as ET
          
          plugins_dir = 'plugins'
          output_file = 'plugins.xml'
          root = ET.Element('plugins')
          
          if os.path.exists(plugins_dir):
              for filename in os.listdir(plugins_dir):
                  if filename.endswith('.zip'):
                      path = os.path.join(plugins_dir, filename)
                      try:
                          with zipfile.ZipFile(path, 'r') as z:
                              meta_content = next(z.read(name) for name in z.namelist() if 'metadata.txt' in name).decode('utf-8')
                              meta = dict(line.split('=', 1) for line in meta_content.splitlines() if '=' in line)
                              
                              py_plugin = ET.SubElement(root, 'pyqgis_plugin', name=meta.get('name', filename), version=meta.get('version', '0.1'))
                              ET.SubElement(py_plugin, 'description').text = meta.get('description', '')
                              ET.SubElement(py_plugin, 'version').text = meta.get('version', '0.1')
                              ET.SubElement(py_plugin, 'author_name').text = meta.get('author', 'Unknown')
                              ET.SubElement(py_plugin, 'download_url').text = f'https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/plugins/{filename}'
                              ET.SubElement(py_plugin, 'file_name').text = filename
                      except Exception as e:
                          print(f'Fehler bei {filename}: {e}')
          
          tree = ET.ElementTree(root)
          ET.indent(tree, space='  ', level=0)
          tree.write(output_file, encoding='utf-8', xml_declaration=True)
          "

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages