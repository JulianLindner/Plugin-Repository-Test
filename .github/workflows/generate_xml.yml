name: Generate QGIS Python Plugins Repository

on:
  push:
    paths:
      - 'plugins/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout
        uses: actions/checkout@v4 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate plugins.xml
        run: |
          pip install qgis-plugin-repo
          # Wir erzwingen die Ausführung im richtigen Verzeichnis
          # Und wir nutzen einen Punkt vor dem Pfad, damit Linux sicher weiß: Das ist ein Ordner.
          qgis-plugin-repo merge ./plugins.xml ./plugins/ || echo "Fehler beim Mergen, versuche alternativen Aufruf..."
          
          # Falls das Tool immer noch zickt, erzwingen wir die Erstellung:
          if [ ! -f plugins.xml ] || [ ! -s plugins.xml ]; then
            echo '<?xml version="1.0" encoding="UTF-8"?><plugins></plugins>' > plugins.xml
            qgis-plugin-repo merge ./plugins.xml ./plugins/
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages