name: Generate QGIS Python Plugins Repository

on:
  push:
    paths:
      - 'plugins/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate plugins.xml
        run: |
          pip install qgis-plugin-repo
          qgis-plugin-repo merge . plugins/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./